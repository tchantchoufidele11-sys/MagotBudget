<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MagotBudget">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1628"/>
      <stop offset="0.55" stop-color="#0f1f3d"/>
      <stop offset="1" stop-color="#0a1f32"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="250" cy="150" r="260" fill="url(#glow)"/>
  <circle cx="1050" cy="320" r="220" fill="url(#glow)" opacity="0.5"/>

  <!-- Floating euro coins -->
  <g opacity="0.85">
    <circle cx="930" cy="92" r="26" fill="url(#coin)"/>
    <text x="930" y="101" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#7c4a03" text-anchor="middle">€</text>
  </g>
  <g opacity="0.5">
    <circle cx="1010" cy="170" r="18" fill="url(#coin)"/>
    <text x="1010" y="177" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#7c4a03" text-anchor="middle">€</text>
  </g>
  <g opacity="0.35">
    <circle cx="880" cy="240" r="14" fill="url(#coin)"/>
  </g>

  <!-- App icon tile: treasure / magot -->
  <g filter="url(#soft)" transform="translate(96,108)">
    <rect width="144" height="144" rx="34" fill="url(#teal)"/>
    <rect x="0.5" y="0.5" width="143" height="143" rx="33.5" fill="none" stroke="#ffffff" stroke-opacity="0.18"/>
    <!-- chest body -->
    <g transform="translate(30,38)">
      <rect x="0" y="26" width="84" height="50" rx="8" fill="#0a3a35"/>
      <path d="M0 40 Q42 8 84 40 L84 26 Q42 -6 0 26 Z" fill="#0e4d46"/>
      <rect x="0" y="38" width="84" height="10" fill="#facc15"/>
      <rect x="36" y="34" width="12" height="22" rx="3" fill="#facc15"/>
      <circle cx="42" cy="45" r="4" fill="#0a3a35"/>
      <!-- coins peeking -->
      <circle cx="20" cy="22" r="9" fill="url(#coin)"/>
      <circle cx="40" cy="16" r="10" fill="url(#coin)"/>
      <circle cx="62" cy="22" r="9" fill="url(#coin)"/>
      <text x="40" y="21" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" fill="#7c4a03" text-anchor="middle">€</text>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="280" y="170" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="-1.5" fill="#ffffff">MagotBudget</text>
  <text x="282" y="214" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="25" font-weight="500" fill="#9fb3c8">Votre budget familial, privé et 100&#160;% hors-ligne.</text>

  <!-- Accent underline + pills -->
  <rect x="282" y="238" width="120" height="5" rx="2.5" fill="url(#teal)"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">
    <g transform="translate(282,262)">
      <rect width="132" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#14b8a6" stroke-opacity="0.5"/>
      <text x="66" y="22" fill="#5eead4" text-anchor="middle">PWA hors-ligne</text>
    </g>
    <g transform="translate(426,262)">
      <rect width="156" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#14b8a6" stroke-opacity="0.5"/>
      <text x="78" y="22" fill="#5eead4" text-anchor="middle">Chiffré AES-256</text>
    </g>
    <g transform="translate(594,262)">
      <rect width="118" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#14b8a6" stroke-opacity="0.5"/>
      <text x="59" y="22" fill="#5eead4" text-anchor="middle">5 langues</text>
    </g>
  </g>
</svg>
